name: Daily Job Search

on:
  schedule:
    # Runs at 11:00 UTC (6 AM ET) every day
    - cron: "0 11 * * *"
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run job search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DAILY_SUMMARIES_PAGE_ID: ${{ secrets.NOTION_DAILY_SUMMARIES_PAGE_ID }}
          NOTION_JOB_TRACKER_DB_ID: ${{ secrets.NOTION_JOB_TRACKER_DB_ID }}
          NOTION_PREFERENCES_DB_ID: ${{ secrets.NOTION_PREFERENCES_DB_ID }}
          NOTION_CONTROL_DB_ID: ${{ secrets.NOTION_CONTROL_DB_ID }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          DICE_API_KEY: ${{ secrets.DICE_API_KEY }}
        run: npx tsx src/index.ts
